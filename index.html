<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Foundation Ramps — Custom Built Skateboard Ramps</title>
  <meta name="description" content="Custom-built skateboard ramps, rails, and obstacles. From backyard setups to full skatepark builds. Foundation Ramps — built to shred." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600;700;800&family=Permanent+Marker&family=Oswald:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { background: #0a0a0a; color: #f5f5f0; font-family: 'Barlow Condensed', sans-serif; overflow-x: hidden; }

    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #0a0a0a; }
    ::-webkit-scrollbar-thumb { background: #FF6B35; border-radius: 4px; }

    .nav-link {
      color: #999; text-decoration: none; font-size: 11px; letter-spacing: 3px;
      text-transform: uppercase; cursor: pointer; transition: color 0.3s, border-color 0.3s;
      padding: 8px 0; border-bottom: 2px solid transparent;
      font-family: 'Barlow Condensed', sans-serif; font-weight: 600;
    }
    .nav-link:hover, .nav-link.active { color: #FF6B35; border-bottom-color: #FF6B35; }

    .section-tag {
      font-family: 'Permanent Marker', cursive; font-size: 13px; color: #FF6B35;
      letter-spacing: 4px; text-transform: uppercase; margin-bottom: 12px; display: inline-block;
    }
    .section-title {
      font-family: 'Oswald', sans-serif; font-size: clamp(32px, 5vw, 56px); font-weight: 700;
      text-transform: uppercase; line-height: 1.05; letter-spacing: -1px;
    }
    .blueprint-grid {
      background-image:
        linear-gradient(rgba(255,107,53,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,107,53,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    .card-hover { transition: transform 0.4s cubic-bezier(0.23, 1, 0.32, 1), box-shadow 0.4s; }
    .card-hover:hover { transform: translateY(-8px); box-shadow: 0 20px 60px rgba(255,107,53,0.15); }

    .merch-card { position: relative; overflow: hidden; cursor: pointer; }
    .merch-card::after {
      content: 'DM US ON INSTA →'; position: absolute; bottom: 0; left: 0; right: 0;
      background: #FF6B35; color: #0a0a0a; font-family: 'Oswald', sans-serif; font-weight: 700;

    .merch-card:hover::after { transform: translateY(0); }

    .glow-btn {
      background: #FF6B35; color: #0a0a0a; border: none; padding: 16px 40px;
      font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 15px;
      letter-spacing: 3px; text-transform: uppercase; cursor: pointer;
      position: relative; overflow: hidden; transition: all 0.3s;
    }
    .glow-btn:hover {
      box-shadow: 0 0 30px rgba(255,107,53,0.5), 0 0 60px rgba(255,107,53,0.2);
      transform: translateY(-2px);
    }
    .glow-btn::before {
      content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: left 0.5s;
    }
    .glow-btn:hover::before { left: 100%; }

    .glow-btn-outline {
      background: transparent; border: 2px solid #FF6B35; color: #FF6B35;
      padding: 16px 40px; font-family: 'Oswald', sans-serif; font-weight: 700;
      font-size: 15px; letter-spacing: 3px; text-transform: uppercase;
      cursor: pointer; transition: all 0.3s;
    }
    .glow-btn-outline:hover {
      background: rgba(255,107,53,0.1);
      box-shadow: 0 0 30px rgba(255,107,53,0.3);
      transform: translateY(-2px);
    }

    .part-dot {
      width: 18px; height: 18px; border-radius: 50%; background: #FF6B35;
      border: 2px solid #f5f5f0; cursor: pointer; position: absolute;
      transform: translate(-50%, -50%); transition: all 0.3s; z-index: 2;
    }
    .part-dot:hover, .part-dot.active {
      background: #f5f5f0; border-color: #FF6B35;
      box-shadow: 0 0 20px rgba(255,107,53,0.6);
      transform: translate(-50%, -50%) scale(1.3);
    }
    .part-dot::before {
      content: ''; position: absolute; top: 50%; left: 50%;
      width: 30px; height: 30px; border-radius: 50%;
      border: 1px solid rgba(255,107,53,0.4);
      transform: translate(-50%, -50%); animation: ping 2s infinite;

    @keyframes ping {
      0% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(2); opacity: 0; }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes marquee {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
    .fade-up { animation: fadeUp 0.8s ease-out forwards; }

    .hamburger {
      display: none; flex-direction: column; gap: 5px;
      cursor: pointer; background: none; border: none; padding: 8px; z-index: 1001;
    }
    .hamburger span {
      width: 24px; height: 2px; background: #f5f5f0;
      transition: all 0.3s; display: block;
    }

    @media (max-width: 768px) {
      .hamburger { display: flex; }
      .desktop-nav { display: none !important; }
      .mobile-menu {
        position: fixed; top: 0; left: 0; right: 0; bottom: 0;

        display: flex; flex-direction: column; align-items: center;
        justify-content: center; gap: 24px;

      .board-grid { grid-template-columns: 1fr !important; }

    .stat-num {
      font-family: 'Oswald', sans-serif; font-size: clamp(40px, 6vw, 64px);
      font-weight: 700; color: #FF6B35; line-height: 1;
    }
    .stat-label { font-size: 11px; letter-spacing: 3px; color: #666; text-transform: uppercase; margin-top: 8px; }

    .social-icon {
      width: 48px; height: 48px; border: 1px solid rgba(255,107,53,0.2);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Oswald', sans-serif; font-weight: 700; font-size: 13px;
      color: #FF6B35; text-decoration: none; letter-spacing: 1;
      transition: all 0.3s; cursor: pointer;
    }
    .social-icon:hover { background: #FF6B35; color: #0a0a0a; }

    .footer-link {
      color: #555; font-size: 12px; text-decoration: none;
      letter-spacing: 2px; transition: color 0.3s; font-weight: 600;
    }
    .footer-link:hover { color: #FF6B35; }

    input, textarea, select {
      width: 100%; padding: 12px 16px; background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08); color: #f5f5f0; font-size: 14px;
      font-family: 'Barlow Condensed', sans-serif; outline: none; transition: border-color 0.3s;
    }

    select { color: #888; }
    textarea { resize: vertical; }

    .noise-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 9999; opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }
  </style>
</head>
<body>

<script type="text/babel">

  { name: "Blueprint Tee — Black", color: "#1a1a1a", type: "T-Shirt", price: "$35" },
  { name: "Foundation Ramps Cap", color: "#FF6B35", type: "Cap", price: "$30" },
  { name: "Sketch Logo Tee — White", color: "#f5f5f0", type: "T-Shirt", price: "$35" },
];

const BOARD_PARTS = [
  { name: "NOSE", desc: "The front of the board — slightly wider and longer than the tail for better catch on flip tricks.", x: 15, y: 18 },
  { name: "TAIL", desc: "The rear kick of the board — your pop zone for ollies, kickflips, and every trick in the book.", x: 75, y: 82 },
  { name: "TRUCKS", desc: "Metal axles mounted to the underside. They let you turn and grind. Tighten for stability, loosen for carving.", x: 30, y: 55 },
  { name: "WHEELS", desc: "Urethane wheels. Smaller = lighter for tricks. Larger = faster for cruising. Hardness matters too.", x: 12, y: 70 },
  { name: "BEARINGS", desc: "Sit inside each wheel. ABEC ratings measure precision — higher = smoother roll. Keep them clean.", x: 50, y: 42 },
  { name: "GRIP TAPE", desc: "Sandpaper-like sheet on top of the deck. Keeps your feet locked in. Replace when it gets slick.", x: 82, y: 30 },

function RampIcon({ type, size = 80 }) {
  return (
    <svg width={size} height={size} viewBox="0 0 80 80" fill="none" stroke="rgba(255,107,53,0.9)" strokeWidth="1.5" strokeLinecap="round">
      {type === "halfpipe" && <g><path d="M10 55 Q10 25 25 25 L55 25 Q70 25 70 55" /><line x1="10" y1="55" x2="10" y2="65" /><line x1="70" y1="55" x2="70" y2="65" /><line x1="10" y1="65" x2="70" y2="65" /><line x1="25" y1="25" x2="55" y2="25" strokeDasharray="3 3" opacity="0.5" /></g>}
      {type === "quarter" && <g><path d="M15 60 Q15 25 50 25 L65 25 L65 60 Z" /><line x1="50" y1="25" x2="65" y2="25" strokeDasharray="3 3" opacity="0.5" /></g>}

      {type === "vert" && <g><path d="M15 60 Q15 15 15 15 L15 10 M15 15 Q15 15 40 15 L65 15 L65 60" /><line x1="15" y1="60" x2="65" y2="60" /><path d="M15 10 L15 15" strokeWidth="2.5" /><path d="M65 10 L65 15" strokeWidth="2.5" /></g>}

    </svg>
  );
}

function Counter({ end, duration = 2000, suffix = "" }) {
  const [count, setCount] = useState(0);
  const ref = useRef(null);
  const [started, setStarted] = useState(false);

  useEffect(() => {
    const observer = new IntersectionObserver(([entry]) => {
      if (entry.isIntersecting && !started) setStarted(true);
    }, { threshold: 0.5 });
    if (ref.current) observer.observe(ref.current);
    return () => observer.disconnect();
  }, [started]);

  useEffect(() => {
    if (!started) return;
    let cur = 0;
    const step = end / (duration / 16);
    const timer = setInterval(() => {
      cur += step;
      if (cur >= end) { setCount(end); clearInterval(timer); }
      else setCount(Math.floor(cur));
    }, 16);
    return () => clearInterval(timer);
  }, [started, end, duration]);

  return <span ref={ref}>{count}{suffix}</span>;
}

        </div>

        </div>

            ))}

        )}

        minHeight: "100vh", display: "flex", alignItems: "center",
        position: "relative", overflow: "hidden",
        padding: "100px clamp(20px, 4vw, 60px) 60px",
      }}>
        <div style={{
          position: "absolute", right: "-5%", top: "50%",
          transform: "translateY(-50%) rotate(-90deg)",
          fontFamily: "'Oswald', sans-serif", fontSize: "clamp(80px, 15vw, 200px)",
          fontWeight: 800, color: "rgba(255,107,53,0.04)", whiteSpace: "nowrap",
          letterSpacing: 20, pointerEvents: "none", userSelect: "none",
        }}>FOUNDATION</div>

        <div style={{ maxWidth: 800, zIndex: 1 }}>
          <div className="fade-up" style={{ animationDelay: "0.2s" }}>
            <span style={{
              fontFamily: "'Permanent Marker', cursive", fontSize: 14,

            }}>★ CUSTOM BUILT SKATEBOARD RAMPS ★</span>
          </div>

          <h1 className="fade-up" style={{
            fontFamily: "'Oswald', sans-serif", fontSize: "clamp(48px, 8vw, 96px)",

                <circle cx="80" cy="104" r="14" fill="rgba(255,107,53,0.1)" stroke="#FF6B35" />
                <circle cx="220" cy="104" r="14" fill="rgba(255,107,53,0.1)" stroke="#FF6B35" />
                <circle cx="80" cy="214" r="14" fill="rgba(255,107,53,0.1)" stroke="#FF6B35" />

                <circle cx="80" cy="104" r="4" fill="#FF6B35" opacity="0.5" />
                <circle cx="220" cy="104" r="4" fill="#FF6B35" opacity="0.5" />
                <circle cx="80" cy="214" r="4" fill="#FF6B35" opacity="0.5" />

                  padding: "16px 20px",
                  background: activePart === i ? "rgba(255,107,53,0.1)" : "rgba(255,255,255,0.02)",

                      fontFamily: "'Oswald', sans-serif", fontSize: 16, fontWeight: 600,

                      transition: "color 0.3s",

                    <span style={{
                      color: "#FF6B35", fontSize: 18,

                      transition: "transform 0.3s", display: "inline-block",

                  </div>

                    <p style={{
                      color: "#888", fontSize: 13, lineHeight: 1.7,

              aspectRatio: "3/4", background: "linear-gradient(135deg, rgba(255,107,53,0.1), rgba(255,107,53,0.02))",

              alignItems: "center", justifyContent: "center", position: "relative", overflow: "hidden",

              </p>
              <p style={{ color: "#aaa", fontSize: 16, lineHeight: 1.8, marginBottom: 40 }}>
                Every Foundation Ramp is designed with real skaters in mind. No shortcuts. No compromises. Just solid ramps built to ride hard and last.

                    <div style={{ fontFamily: "'Oswald'", fontWeight: 700, fontSize: 16, color: "#FF6B35", letterSpacing: 1 }}>{item.label}</div>
                    <div style={{ fontSize: 11, color: "#666", letterSpacing: 2, marginTop: 4 }}>{item.sub}</div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>
      </section>

              <div key={i} className="merch-card card-hover" style={{
                background: "rgba(255,255,255,0.02)", border: "1px solid rgba(255,255,255,0.06)",

                  aspectRatio: "1", background: "linear-gradient(135deg, " + item.color + "22, " + item.color + "08)",

                  <MerchIcon type={item.type} color={item.color} />

                    fontFamily: "'Permanent Marker', cursive", fontSize: 11,
                    color: item.color === "#1a1a1a" ? "#f5f5f0" : item.color, opacity: 0.4, marginTop: 8,
                  }}>FOUNDATION RAMPS</div>

                <div style={{ padding: "16px 20px 24px" }}>
                  <div style={{ fontSize: 11, color: "#FF6B35", letterSpacing: 2, marginBottom: 4, fontWeight: 600 }}>{item.type.toUpperCase()}</div>

                  <div style={{ fontFamily: "'Oswald'", fontSize: 20, fontWeight: 700, color: "#FF6B35", marginTop: 8 }}>{item.price}</div>
                </div>

      </section>

      {/* GALLERY */}
      <section style={{ padding: "100px clamp(20px, 4vw, 60px) 60px", background: "rgba(255,107,53,0.02)" }}>

          <div className="section-tag">THE WORK</div>
          <h2 className="section-title" style={{ marginBottom: 50 }}>

                display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
                position: "relative", overflow: "hidden", border: "1px solid rgba(255,255,255,0.03)",

            GET IN<br /><span style={{ color: "#FF6B35" }}>TOUCH</span>

          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(300px, 1fr))", gap: 60 }}>

                  { icon: "✉", label: "EMAIL", value: "info@foundationramps.com" },
                  { icon: "📱", label: "PHONE", value: "+1 (XXX) XXX-XXXX" },
                  { icon: "📍", label: "LOCATION", value: "Your City, State" },
                ].map((c, i) => (
                  <div key={i} style={{ display: "flex", gap: 16, alignItems: "flex-start" }}>
                    <div style={{
                      width: 44, height: 44, background: "rgba(255,107,53,0.1)",
                      display: "flex", alignItems: "center", justifyContent: "center",
                      fontSize: 18, flexShrink: 0,
                    }}>{c.icon}</div>
                    <div>
                      <div style={{ fontSize: 11, letterSpacing: 3, color: "#666", marginBottom: 4, fontWeight: 600 }}>{c.label}</div>
                      <div style={{ fontSize: 15, color: "#ccc" }}>{c.value}</div>

                <div style={{ fontSize: 11, letterSpacing: 3, color: "#666", marginBottom: 16, fontWeight: 600 }}>FOLLOW US</div>

                  {[{ name: "Instagram", icon: "IG" }, { name: "TikTok", icon: "TT" }, { name: "YouTube", icon: "YT" }, { name: "Facebook", icon: "FB" }].map((s, i) => (
                    <a key={i} href="#" className="social-icon" title={s.name}>{s.icon}</a>
                  ))}

              </div>
            </div>
            <div style={{ background: "rgba(255,255,255,0.02)", border: "1px solid rgba(255,255,255,0.06)", padding: "36px 32px" }}>
              <h3 style={{ fontFamily: "'Oswald'", fontWeight: 700, fontSize: 20, letterSpacing: 2, marginBottom: 24 }}>REQUEST A QUOTE</h3>
              {["Your Name", "Email Address", "Phone Number"].map((label, i) => (
                <div key={i} style={{ marginBottom: 16 }}>
                  <label style={{ fontSize: 11, letterSpacing: 2, color: "#666", display: "block", marginBottom: 6, fontWeight: 600 }}>{label.toUpperCase()}</label>
                  <input type={i === 1 ? "email" : "text"} placeholder={label} />
                </div>
              ))}
              <div style={{ marginBottom: 16 }}>
                <label style={{ fontSize: 11, letterSpacing: 2, color: "#666", display: "block", marginBottom: 6, fontWeight: 600 }}>PROJECT TYPE</label>
                <select>
                  <option>Select ramp type...</option>
                  <option>Halfpipe / Mini Ramp</option>
                  <option>Quarter Pipe</option>
                  <option>Grind Box</option>
                  <option>Skate Rail</option>
                  <option>Custom Skatepark</option>
                  <option>Other</option>
                </select>
              </div>
              <div style={{ marginBottom: 24 }}>
                <label style={{ fontSize: 11, letterSpacing: 2, color: "#666", display: "block", marginBottom: 6, fontWeight: 600 }}>PROJECT DETAILS</label>
                <textarea rows="4" placeholder="Tell us about your build — dimensions, location, budget, timeline..."></textarea>
              </div>
              <button className="glow-btn" style={{ width: "100%" }}>SEND IT →</button>
            </div>
          </div>
        </div>
      </section>

      {/* FOOTER */}
      <footer style={{ borderTop: "1px solid rgba(255,107,53,0.1)", padding: "40px clamp(20px, 4vw, 60px)", background: "#050505" }}>
        <div style={{
          maxWidth: 1200, margin: "0 auto", display: "flex",
          justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 20,
        }}>
          <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
            <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
              <rect width="28" height="28" fill="#FF6B35" rx="3" />
              <text x="14" y="19" textAnchor="middle" fill="#0a0a0a" fontSize="14" fontFamily="Oswald" fontWeight="700">FR</text>
            </svg>
            <span style={{ fontFamily: "'Oswald'", fontWeight: 600, fontSize: 14, letterSpacing: 2 }}>FOUNDATION RAMPS</span>
          </div>
          <div style={{ color: "#555", fontSize: 12, letterSpacing: 1 }}>© 2026 Foundation Ramps. All rights reserved. Built to shred.</div>
          <div style={{ display: "flex", gap: 20 }}>
            {["Instagram", "TikTok", "YouTube"].map((s, i) => (
              <a key={i} href="#" className="footer-link">{s.toUpperCase()}</a>
            ))}
          </div>
        </div>
      </footer>
    </div>
  );
}
